<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YBY Compiler</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>YBY Compiler</h1>
      <p>Run Python in your browser with simple output and error help.</p>
    </header>

    <section class="card">
      <h2>Python Editor</h2>
      <textarea id="codeInput" spellcheck="false"></textarea>

      <div class="toolbar">
        <button id="runButton" disabled>Run Python</button>
        <button id="clearButton">Clear Output</button>
      </div>

      <div class="toolbar data-tools">
        <label for="dataFileInput" class="upload-label">Upload dataset(s)</label>
        <input id="dataFileInput" type="file" multiple accept=".csv,.json,.txt,.tsv,.xlsx,.parquet" />
        <button id="mountDataButton">Attach to Python</button>
      </div>

      <p id="datasetHint">Files will be available at: <code>/home/pyodide/data/filename</code></p>
      <p id="runtimeStatus">Loading Python runtime...</p>
    </section>

    <section class="card">
      <h2>Output</h2>
      <pre id="outputConsole">Python runtime is loading...</pre>
    </section>

    <section class="card">
      <h2>Explanation</h2>
      <div id="humanMessage">Run your code to see explanation.</div>
      <ul id="improvementList"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.2/full/pyodide.js"></script>
  <script src="./script.js"></script>
</body>
</html>
